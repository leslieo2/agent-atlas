name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Sync backend dependencies
        run: make -C apps/control-plane sync
      - name: Run backend CI
        run: make -C apps/control-plane ci

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies
        run: make -C apps/web install-ci
      - name: Run frontend CI
        run: make -C apps/web ci

  packages:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Run shared package and runtime CI
        run: make ci-packages

  frontend_e2e:
    runs-on: ubuntu-latest
    needs:
      - frontend
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies
        run: make -C apps/web install-ci
      - name: Install Playwright browser
        run: npx --prefix apps/web playwright install --with-deps chromium
      - name: Run frontend e2e
        run: make -C apps/web e2e
